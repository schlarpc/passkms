name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  check:
    name: Nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - run: nix flake check --print-build-logs

  build-windows:
    name: Build Windows artifacts
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build passkms-windows
        run: nix build .#passkms-windows --print-build-logs

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: passkms-windows
          path: result/bin/passkms-windows.exe

      - name: Build passkms-msix
        run: nix build .#passkms-msix --print-build-logs

      - name: Upload MSIX package
        uses: actions/upload-artifact@v4
        with:
          name: passkms-msix
          path: result/*.msix

  release:
    name: Create GitHub release
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/passkms-windows/passkms-windows.exe
            artifacts/passkms-msix/*.msix
